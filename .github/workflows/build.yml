on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: [ '5.3', '5.4', '5.5', '5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5' ]
    name: Run Unit Test on PHP ${{ matrix.php-versions }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}
        coverage: xdebug

    - name: Check the PHP version
      run: php -v

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Install third-party packages for PHP 5.3
      if: ${{ matrix.php-versions == '5.3' }}
      run: composer require http-interop/http-middleware:^0.4.1 twig/twig --dev

    - name: Install third-party packages not for PHP 5.3
      if: ${{ matrix.php-versions != '5.3' }}
      run: composer require filp/whoops league/container nikic/fast-route rdlowrey/auryn twig/twig --dev

    - name: Install third-party packages for PHP 5.4
      if: ${{ matrix.php-versions == '5.4' }}
      run: composer require http-interop/http-middleware:^0.4.1 phroute/phroute zendframework/zend-diactoros zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 5.5
      if: ${{ matrix.php-versions == '5.5' }}
      run: composer require http-interop/http-middleware:^0.4.1 phroute/phroute zendframework/zend-diactoros zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 5.6
      if: ${{ matrix.php-versions == '5.6' }}
      run: composer require http-interop/http-middleware:^0.4.1 phroute/phroute --dev

    - name: Install third-party packages for PHP 7.0
      if: ${{ matrix.php-versions == '7.0' }}
      run: composer require http-interop/http-middleware:^0.4.1 phroute/phroute --dev

    - name: Install third-party packages for PHP 7.1
      if: ${{ matrix.php-versions == '7.1' }}
      run: composer require http-interop/http-middleware:^0.4.1 phroute/phroute zendframework/zend-diactoros zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 7.2
      if: ${{ matrix.php-versions == '7.2' }}
      run: composer require phroute/phroute zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 7.3
      if: ${{ matrix.php-versions == '7.3' }}
      run: composer require phroute/phroute zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 7.4
      if: ${{ matrix.php-versions == '7.4' }}
      run: composer require phroute/phroute zendframework/zend-stratigility --dev

    - name: Install third-party packages for PHP 8.0
      if: ${{ matrix.php-versions == '8.0' }}
      run: composer require phroute/phroute --dev

    - name: Install third-party packages for PHP 8.1
      if: ${{ matrix.php-versions == '8.1' }}
      run: composer require phroute/phroute --dev

    - name: Install third-party packages for PHP 8.2
      if: ${{ matrix.php-versions == '8.2' }}
      run: composer require phroute/phroute --dev

    - name: Install third-party packages for PHP 8.3
      if: ${{ matrix.php-versions == '8.3' }}
      run: composer require phroute/phroute --dev

    - name: Run test suite
      run: vendor/bin/phpunit --coverage-clover=coverage.clover

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
